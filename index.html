<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./style.css">
    <title>Calculator</title>
</head>
<body>
 
    <div>
        <h1>Calculator</h1>
    </div>
    <div class="calculator">
        <div class="display" id="display"></div>
        <div class="buttons">
            <button class="btn" id="clear" value="C">C</button>
            <button class="btn" id="clearEntry" value="CE">CE</button>
            <button class="btn" id="divide" value="/">/</button>
            <button class="btn" id="multiply" value="*">*</button>
            <button class="btn" id="subtract" value="-">-</button>
            <button class="btn" id="add" value="+">+</button>
            <button class="btn" id="9" value="9">9</button>
            <button class="btn" id="8" value="8">8</button>
            <button class="btn" id="7" value="7">7</button> 
            <button class="btn" id="6" value="6">6</button>  
            <button class="btn" id="5" value="5">5</button>
            <button class="btn" id="4" value="4">4</button>
            <button class="btn" id="3" value="3">3</button>
            <button class="btn" id="2" value="2">2</button>
            <button class="btn" id="1" value="1">1</button>
            <button class="btn" id="0" value="0">0</button>
            <button class="btn" id="decimal" value=".">.</button>
            <button class="btn" id="equals" value="=">=</button>
            
        </div>
    </div>


<script src="./script.js"></script>    
</body>
</html>
